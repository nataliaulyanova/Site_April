<svg width="512" height="320" viewBox="0 0 512 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1f2937" flood-opacity="0.18"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.3"/>
    </filter>
    <linearGradient id="backCard" x1="147" y1="64" x2="316" y2="204" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFCD5A"/>
      <stop offset="1" stop-color="#EF7F19"/>
    </linearGradient>
    <linearGradient id="frontCard" x1="193" y1="92" x2="381" y2="224" gradientUnits="userSpaceOnUse">
      <stop stop-color="#43AEFF"/>
      <stop offset="1" stop-color="#1687EA"/>
    </linearGradient>
    <linearGradient id="chip" x1="205" y1="115" x2="238" y2="148" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4D37B"/>
      <stop offset="1" stop-color="#DFAF3E"/>
    </linearGradient>
    <clipPath id="frontClip">
      <rect x="184" y="90" width="210" height="130" rx="12"/>
    </clipPath>
  </defs>

  <!-- transparent background -->
  <g filter="url(#shadow)">
    <!-- rear orange card -->
    <rect x="126" y="62" width="208" height="128" rx="12" fill="url(#backCard)"/>
    <rect x="126" y="62" width="208" height="128" rx="12" stroke="#E7A33D" stroke-width="2"/>
    <rect x="126" y="84" width="208" height="24" fill="#F6FAFF" opacity="0.88"/>
    <rect x="148" y="122" width="37" height="8" rx="4" fill="#FFFFFF" opacity="0.65"/>
    <rect x="148" y="146" width="76" height="7" rx="3.5" fill="#FFFFFF" opacity="0.38"/>
    <circle cx="294" cy="153" r="18" fill="#FFFFFF" opacity="0.28"/>
  </g>

  <g filter="url(#shadow)">
    <!-- front blue card -->
    <rect x="184" y="90" width="210" height="130" rx="12" fill="url(#frontCard)"/>
    <rect x="184" y="90" width="210" height="130" rx="12" stroke="#2D9BF4" stroke-width="2"/>

    <!-- subtle highlight -->
    <g clip-path="url(#frontClip)">
      <path d="M185 92H394V122C337 110 272 110 185 128V92Z" fill="#7ED0FF" opacity="0.22"/>
    </g>

    <!-- chip -->
    <rect x="207" y="116" width="32" height="31" rx="4" fill="url(#chip)"/>
    <path d="M217 116V147M229 116V147M207 126H239M207 137H239" stroke="#F7E4AC" stroke-width="2" opacity="0.65"/>

    <!-- top right mark -->
    <rect x="310" y="116" width="52" height="9" rx="4.5" fill="#EAF7FF" opacity="0.95"/>
    <rect x="313" y="119" width="46" height="3" rx="1.5" fill="#B8E5FF" opacity="0.9"/>

    <!-- number groups -->
    <rect x="207" y="164" width="34" height="8" rx="4" fill="#EAF7FF" opacity="0.92"/>
    <rect x="252" y="164" width="34" height="8" rx="4" fill="#EAF7FF" opacity="0.92"/>
    <rect x="297" y="164" width="34" height="8" rx="4" fill="#EAF7FF" opacity="0.92"/>
    <rect x="342" y="164" width="26" height="8" rx="4" fill="#EAF7FF" opacity="0.92"/>

    <!-- cardholder text -->
    <rect x="207" y="191" width="58" height="8" rx="4" fill="#F3FBFF" opacity="0.65"/>
    <rect x="207" y="203" width="92" height="7" rx="3.5" fill="#F3FBFF" opacity="0.45"/>
  </g>
</svg>
